<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Gaia Academy</title>
    <link rel="icon" type="image/png" href="image/favicon.png">
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {

            theme: {
                extend: {
                    colors: {
                        primary: '#14532D',
                        secondary: '#A16207',
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center p-4 auth-page">

    <!-- Floating Toggles -->
    <div class="fixed top-6 right-6 flex items-center gap-3 z-50">
        <button class="theme-toggle w-12 h-12 flex items-center justify-center rounded-2xl bg-white shadow-xl hover:scale-110 transition-all border border-gray-100">
            <i class="fas fa-moon theme-toggle-icon text-primary text-xl"></i>
        </button>
        <button class="rtl-toggle w-12 h-12 flex items-center justify-center rounded-2xl bg-white shadow-xl hover:scale-110 transition-all border border-gray-100">
            <i class="fas fa-right-left rtl-toggle-icon text-primary text-xl"></i>
        </button>
    </div>

    <!-- Signup Card -->
    <div class="w-full max-w-md reveal-on-scroll mt-10 mb-10">
        <div class="bg-white rounded-3xl shadow-2xl p-8 border border-gray-100">
            <div class="text-center mb-10">
                <a href="index.html" class="inline-flex items-center gap-2 mb-4 group">
                    <img src="image/favicon.png" alt="Logo" class="logo-brand-img group-hover:rotate-12 transition-all">
                    <span class="logo-brand-text text-primary">Gaia Academy</span>
                </a>
                <h2 class="text-3xl font-extrabold text-gray-900">Join the Movement</h2>
                <p class="text-gray-500 mt-2">Create your sustainability learning account</p>
            </div>

            <form action="dashboard.html" class="space-y-4">
                <!-- Name -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                    <input type="text" required placeholder="Enter your full name" 
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white text-gray-900 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all">
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                    <input type="email" required placeholder="Enter your email" 
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white text-gray-900 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all">
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white text-gray-900 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all">
                        <button type="button" onclick="togglePassword('password', 'eye-icon')" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary transition-colors">
                            <i class="fas fa-eye" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Confirm Password</label>
                    <div class="relative">
                        <input type="password" id="confirm-password" required placeholder="••••••••" 
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white text-gray-900 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all">
                        <button type="button" onclick="togglePassword('confirm-password', 'eye-icon-2')" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary transition-colors">
                            <i class="fas fa-eye" id="eye-icon-2"></i>
                        </button>
                    </div>
                </div>

                <!-- Terms and Conditions -->
                <div class="flex items-start gap-3">
                    <input type="checkbox" id="terms" required class="w-4 h-4 rounded border-gray-300 text-primary focus:ring-primary mt-1">
                    <label for="terms" class="text-sm text-gray-600">
                        I agree to the <a href="#" class="text-primary font-semibold hover:underline">Terms and Conditions</a> and <a href="#" class="text-primary font-semibold hover:underline">Privacy Policy</a>
                    </label>
                </div>

                <!-- Signup CTA -->
                <button type="submit" class="w-full btn-primary-gaia rounded-xl shadow-lg hover:shadow-primary/20 mt-4">
                    Create Account
                </button>

                <!-- Social Signup -->
                <div class="relative py-4">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-3 bg-white text-gray-500">Or sign up with</span>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <button type="button" class="flex justify-center items-center py-3 border border-gray-200 rounded-xl hover:bg-gray-50 hover:scale-105 hover:shadow-md transition-all">
                        <i class="fab fa-google text-red-500 text-xl"></i>
                    </button>
                    <button type="button" class="flex justify-center items-center py-3 border border-gray-200 rounded-xl hover:bg-gray-50 hover:scale-105 hover:shadow-md transition-all">
                        <i class="fab fa-apple text-black text-xl"></i>
                    </button>
                    <button type="button" class="flex justify-center items-center py-3 border border-gray-200 rounded-xl hover:bg-gray-50 hover:scale-105 hover:shadow-md transition-all">
                        <i class="fab fa-facebook text-blue-600 text-xl"></i>
                    </button>
                </div>
                    <!-- Pathways -->
            <p class="text-center mt-8 text-gray-600">
                Already have an account? 
                <a href="login.html" class="text-primary font-bold hover:underline">Login</a>
            </p>
            <p class="text-center mt-2 text-gray-500 text-sm">
                Facing issues? 
                <a href="contact.html" class="text-primary/70 font-semibold hover:underline">Contact Support</a>
            </p>
        </div>
    </div>

    <!-- Secondary Action -->
    <p class="text-gray-400 text-xs mt-8 pb-10">
        © 2026 Gaia Academy. All rights reserved.
    </p>

    <!-- Back to Top Button -->
    <button id="back-to-top" title="Go to top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        function togglePassword(inputId, iconId) {
            const pwd = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
